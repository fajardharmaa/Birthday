 <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    

    <title>Selamat Ulang Tahun!</title>
    
    <link rel="icon" type="image/png"  href="favicon-32x32.png?v=2">

    <style>
        body {
            margin: 0;
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #f374e0, #e792f6);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Poppins';
            color: #fff;
        }
        .center-text {
            text-align: center;
        }
        
        #confetti-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        #envelope {
            position: relative;
            width: 400px;
            height: 300px;
            cursor: pointer;
            z-index: 2;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        #top {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        #letter {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ffffff;
            color: #000000;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0px 1px 10 px rgba(0, 0, 0, 0.2);
            z-index: 3;
            animation: fadeIn 0.5s ease-in-out;
            font-size: 14px;
            width: 300px;
            height: 225px;
            font-family: 'Montserrat', sans-serif; 
            
        }

        button {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #000dff;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            cursor: pointer;
            color: white;
            font-size: 17px;
            font-weight: bold;
            z-index: 3;
            transition: background-color 0.3s;
            font-family: 'Poppins', sans-serif;
        
        }

        button:hover {
            background-color: #00d5ff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -60%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        .confetti {
            position: absolute;
            font-size: 1.5rem;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }
        .balloons, .cake, .stars {
            position: absolute;
            bottom: 0;
            font-size: 2rem;
            animation: rise 4s forwards;
        }

        @keyframes rise {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100vh); }
        }
    </style>
</head>
<body>
    <div id="confetti-container"></div>
    <div id="envelope">
        <svg id="top" xmlns="http://www.w3.org/2000/svg" width="400" height="300">
            <polygon points="0,0 200,150 400,0" style="fill:#fff;stroke:#ffff;stroke-width:5px"/>
        </svg>
        <div id="letter">
            <h1 class="center-text" >Happy Birthday!  </h1>
            <p class="center-text">Azzahra Musmirotul Izah 
            <p class="center-text">I hope you grow into a person who always spreads kindness and becomes more mature. i hope life treats you kind, i always believe in you. godspeed</p>
            <p class="center-text">  黎明 </p>
            <p id="wish" style="display: none;"> 1312 </p>
        </div>
        <button id="openButton"> PRESS ME! (repeatedly) </button>
    </div>

    <audio id="birthdaySound" src="https://raw.githubusercontent.com/fajardharmaa/Birthday/main/Rex%20Orange%20County%20-%20Best%20Friend%20(Official%20Audio)%20(mp3cut.net).mp3" preload="auto"></audio>

    <script>
        const confettiContainer = document.getElementById('confetti-container');
const openButton = document.getElementById('openButton');
const letter = document.getElementById('letter');
const birthdaySound = document.getElementById('birthdaySound');

const showConfetti = () => {
    for (let i = 0; i < 20; i++) { 
        const confetti = document.createElement('div');
        confetti.classList.add('confetti');
        confetti.textContent = '🎉';
        confetti.style.left = Math.random() * window.innerWidth + 'px';
        confetti.style.animationDuration = Math.random() * 2 + 3 + 's'; 

        setTimeout(() => {
            confetti.remove();
        }, 5000);
    }
};

const showBalloons = () => {
    for (let i = 0; i < 5; i++) { 
        const balloon = document.createElement('div');
        balloon.textContent = '🎈';
        balloon.classList.add('balloons');
        balloon.style.left = Math.random() * window.innerWidth + 'px';
        confettiContainer.appendChild(balloon);

        setTimeout(() => {
            balloon.remove();
        }, 4000);
    }
};

const showCake = () => {
    const cake = document.createElement('div');
    cake.textContent = '🍓';
    cake.classList.add('cake');
    cake.style.left = Math.random() * window.innerWidth + 'px';
    confettiContainer.appendChild(cake);

    setTimeout(() => {
        cake.remove();
    }, 4000);
};

const showStars = () => {
    for (let i = 0; i < 5; i++) { 
        const star = document.createElement('div');
        star.textContent = '✨';
        star.classList.add('stars');
        star.style.left = Math.random() * window.innerWidth + 'px';
        confettiContainer.appendChild(star);

        setTimeout(() => {
            star.remove();
        }, 4000);
    }
};

openButton.addEventListener('click', () => {
    letter.style.display = 'block';
    birthdaySound.play();
    showConfetti();
    showBalloons();
    showCake();
    showStars();
});
</script>

</body>
</html>
